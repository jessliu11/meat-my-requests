<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>meat-my-requests</title>
  </head>
  <body>
    <div id="app"></div>

    <div id="text-panels-container">
      <div id="manager-panel" class="text-panel"> Manager: Must sell at least 4 patties</div>
      <div id="customer-panel" class="text-panel"> Customer: Want 15 pounds of any eat, at least 1 has to be sausage</div>
      <div id="salesman-panel" class="text-panel"> Salesman: You must leave 2 chicken for me to give out as free samples</div>
    </div>

    <div id="meat-panels-container">
      <div id="patty" class="meat-panel"> <img src="/img/patty.png" alt="Patty"> patty - $5, 2 lb </div>
      <div id="sausage" class="meat-panel"> <img src="/img/sausage.png" alt="Sausage"> sausage - $7, 3 lb </div>
      <div id="chicken-wing" class="meat-panel"> <img src="/img/chicken-wing.png" alt="Chicken Wing"> chicken wing - $4, 2 lb </div>
      <div id="chicken-thigh" class="meat-panel"> <img src="/img/chicken-thigh.png" alt="Chicken Thigh"> chicken thigh - $3, 4 lb </div>  
      <div id="steak" class="meat-panel"> <img src="/img/steak.png" alt="Steak"> steak - $10, 5 lb </div>    
    </div>

    <div id="experience">
      <canvas id="experience-canvas" class="experience-canvas"></canvas>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
